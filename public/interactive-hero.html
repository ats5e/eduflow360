const canvas = document.getElementById('hero');
const glowCanvas = document.getElementById('glow');
const ctx = canvas.getContext('2d');
const glowCtx = glowCanvas.getContext('2d');

let mouseX = -99999, mouseY = -99999;
let mouseActive = false;
let frameCount = 0;
let dots = [];
let centerX = 0, centerY = 0;
let imgColors = null;
let imgW = 0, imgH = 0;
let dpr = 1;

function resize() {
  dpr = window.devicePixelRatio || 1;
  const w = window.innerWidth;
  const h = window.innerHeight;
  canvas.width = glowCanvas.width = w * dpr;
  canvas.height = glowCanvas.height = h * dpr;
  canvas.style.width = glowCanvas.style.width = w + 'px';
  canvas.style.height = glowCanvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  glowCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (imgColors) buildDots();
}
window.addEventListener('resize', resize);
resize();

const img = new Image();
img.crossOrigin = 'anonymous';
img.onload = () => {
  const offscreen = document.createElement('canvas');
  offscreen.width = img.naturalWidth;
  offscreen.height = img.naturalHeight;
  imgW = img.naturalWidth;
  imgH = img.naturalHeight;
  const offCtx = offscreen.getContext('2d');
  offCtx.drawImage(img, 0, 0);
  imgColors = offCtx.getImageData(0, 0, imgW, imgH).data;
  buildDots();
  animate();
};
img.src = IMG_SRC;

function sampleColor(normX, normY) {
  const px = Math.floor(normX * (imgW - 1));
  const py = Math.floor(normY * (imgH - 1));
  const i = (py * imgW + px) * 4;
  return { r: imgColors[i], g: imgColors[i+1], b: imgColors[i+2] };
}

function buildDots() {
  dots = [];
  const w = window.innerWidth;
  const h = window.innerHeight;
  // Tight grid — 1.5px logical spacing, dots overlap slightly
  const GAP = 1.5;

  const canvasAspect = w / h;
  const imgAspect = imgW / imgH;
  let drawW, drawH, offsetX, offsetY;
  if (canvasAspect > imgAspect) {
    drawW = w;
    drawH = w / imgAspect;
    offsetX = 0;
    offsetY = (h - drawH) / 2;
  } else {
    drawH = h;
    drawW = h * imgAspect;
    offsetX = (w - drawW) / 2;
    offsetY = 0;
  }

  const cols = Math.ceil(w / GAP) + 1;
  const rows = Math.ceil(h / GAP) + 1;
  let sumX = 0, sumY = 0, count = 0;

  for (let ci = 0; ci < cols; ci++) {
    for (let ri = 0; ri < rows; ri++) {
      const x = ci * GAP;
      const y = ri * GAP;
      const normX = (x - offsetX) / drawW;
      const normY = (y - offsetY) / drawH;
      if (normX < 0 || normX > 1 || normY < 0 || normY > 1) continue;
      const color = sampleColor(normX, normY);
      const brightness = color.r * 0.299 + color.g * 0.587 + color.b * 0.114;
      if (brightness < 5) continue;

      sumX += x; sumY += y; count++;

      dots.push({
        x, y,
        r: color.r, g: color.g, b: color.b,
        brightness,
        depth: brightness / 255,
        distNorm: 0,
      });
    }
  }

  centerX = count > 0 ? sumX / count : w / 2;
  centerY = count > 0 ? sumY / count : h / 2;

  let maxDist = 0;
  for (let i = 0; i < dots.length; i++) {
    const dx = dots[i].x - centerX;
    const dy = dots[i].y - centerY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    dots[i].distNorm = dist;
    if (dist > maxDist) maxDist = dist;
  }
  for (let i = 0; i < dots.length; i++) {
    dots[i].distNorm /= maxDist;
  }
}

window.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY; mouseActive = true;
});
window.addEventListener('touchmove', e => {
  if (e.touches.length > 0) {
    mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; mouseActive = true;
  }
});
window.addEventListener('mouseleave', () => { mouseActive = false; mouseX = -99999; mouseY = -99999; });

function animate() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  ctx.clearRect(0, 0, w, h);
  glowCtx.clearRect(0, 0, w, h);

  const time = frameCount * 0.004;
  const interactRadius = 280;

  // Gentle rocking tilt
  const sinTY = Math.sin(Math.sin(time * 0.5) * 0.21);
  const sinTX = Math.sin(Math.sin(time * 0.35) * 0.12);
  const parallaxMax = 20;

  // Radial pulse wave
  const pulsePhase = (time * 0.6) % 1.0;
  const pulseWidth = 0.15;

  // Breathing
  const breathe = 0.92 + Math.sin(time * 0.8) * 0.08;

  glowCtx.globalCompositeOperation = 'lighter';

  const len = dots.length;
  for (let i = 0; i < len; i++) {
    const dot = dots[i];

    // Parallax shift
    const depthShift = (dot.depth - 0.5) * parallaxMax;
    const px = dot.x + sinTY * depthShift;
    const py = dot.y + sinTX * depthShift * 0.6;

    // Mouse proximity
    const ddx = mouseX - px;
    const ddy = mouseY - py;
    const rawDist = Math.sqrt(ddx * ddx + ddy * ddy);
    const proximity = mouseActive ? Math.max(0, 1 - rawDist / interactRadius) : 0;

    // Radial pulse
    let pulseDist = Math.abs(dot.distNorm - pulsePhase);
    pulseDist = Math.min(pulseDist, 1.0 - pulseDist);
    const pulseIntensity = Math.max(0, 1 - pulseDist / pulseWidth);
    const pulseFactor = pulseIntensity * pulseIntensity * (3 - 2 * pulseIntensity);

    // Color boost
    const boost = (1.3 + 0.25 * pulseFactor + proximity * 1.2) * breathe;
    const cr = Math.min(255, dot.r * boost);
    const cg = Math.min(255, dot.g * boost);
    const cb = Math.min(255, dot.b * boost);
    const crs = ~~cr;
    const cgs = ~~cg;
    const cbs = ~~cb;

    // Alpha
    const baseAlpha = 0.7 + dot.depth * 0.3;
    const alpha = Math.min(1, (baseAlpha + pulseFactor * 0.15 + proximity * 0.15) * breathe);

    // Dot radius: 1.0 base (overlaps at 1.5 gap), grows slightly on pulse/hover
    const dotRadius = 1.0 + pulseFactor * 0.2 + proximity * 0.35;

    // Main dot
    ctx.fillStyle = 'rgba(' + crs + ',' + cgs + ',' + cbs + ',' + alpha + ')';
    ctx.beginPath();
    ctx.arc(px, py, dotRadius, 0, Math.PI * 2);
    ctx.fill();

    // Pulse glow
    if (pulseFactor > 0.15) {
      const pGlowR = 2 + pulseFactor * 4;
      const pGlowA = pulseFactor * 0.05;
      const pg = glowCtx.createRadialGradient(px, py, 0, px, py, pGlowR);
      pg.addColorStop(0, 'rgba(' + crs + ',' + cgs + ',' + cbs + ',' + pGlowA + ')');
      pg.addColorStop(1, 'rgba(' + crs + ',' + cgs + ',' + cbs + ',0)');
      glowCtx.fillStyle = pg;
      glowCtx.beginPath();
      glowCtx.arc(px, py, pGlowR, 0, Math.PI * 2);
      glowCtx.fill();
    }

    // Hover glow
    if (proximity > 0.15) {
      const glowRadius = 2 + proximity * 5;
      const glowAlpha = proximity * 0.07;
      const grd = glowCtx.createRadialGradient(px, py, 0, px, py, glowRadius);
      grd.addColorStop(0, 'rgba(' + crs + ',' + cgs + ',' + cbs + ',' + glowAlpha + ')');
      grd.addColorStop(1, 'rgba(' + crs + ',' + cgs + ',' + cbs + ',0)');
      glowCtx.fillStyle = grd;
      glowCtx.beginPath();
      glowCtx.arc(px, py, glowRadius, 0, Math.PI * 2);
      glowCtx.fill();
    }
  }

  glowCtx.globalCompositeOperation = 'source-over';
  frameCount++;
  requestAnimationFrame(animate);
}
</script>
</body>
</html>
